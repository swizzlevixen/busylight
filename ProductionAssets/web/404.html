<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Scene Not Found | Busy Light</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <script>
    (function () {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-bs-theme', prefersDark ? 'dark' : 'light');
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
        document.documentElement.setAttribute('data-bs-theme', e.matches ? 'dark' : 'light');
      });
    })();
  </script>
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .four-oh-four { flex: 1; display: flex; align-items: center; justify-content: center; }
    .traffic-light { font-size: 4rem; line-height: 1; }
    .light-off { opacity: 0.15; }
    .light-blink { animation: blink 1.5s ease-in-out infinite; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
  </style>
</head>
<body>

<div class="four-oh-four">
  <div class="container text-center">
    <!-- Traffic light with only amber blinking -->
    <div class="traffic-light mb-4" aria-hidden="true">
      <span class="light-off d-block">&#x1F534;</span>
      <span class="light-blink d-block">&#x1F7E1;</span>
      <span class="light-off d-block">&#x1F7E2;</span>
    </div>

    <h1 class="display-1 fw-bold mb-2">404</h1>
    <p class="fs-3 mb-1">Scene Not Found</p>
    <p class="text-body-secondary mb-4">
      This page doesn&rsquo;t exist.
    </p>

    <a href="/" class="btn btn-dark btn-lg px-4">
      <i class="bi bi-house me-2"></i>Go Home
    </a>
  </div>
</div>

<footer class="site-footer">
  <div class="container text-center">
    <p class="mb-0 small" style="opacity: 0.6;">
      &copy; 2026 Mark Boszko. Licensed under MIT.
    </p>
  </div>
</footer>

</body>
</html>
