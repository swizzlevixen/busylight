name: BusyLight
options:
  bundleIdPrefix: com.mboszko
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  BusyLight:
    type: application
    platform: macOS
    sources:
      - path: BusyLight
        excludes:
          - "**/.DS_Store"
          - "BusyLight.help"
      - path: BusyLight/BusyLight.help
        type: folder
        buildPhase: resources
      - path: AppIcon.icon
        buildPhase: resources
    postBuildScripts:
      - name: "Generate Help Index"
        script: |
          hiutil -I corespotlight -Caf "$BUILT_PRODUCTS_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/BusyLight.help/Contents/Resources/en.lproj/search.helpindex" "$BUILT_PRODUCTS_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/BusyLight.help/Contents/Resources/en.lproj/"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mboszko.BusyLight
        PRODUCT_NAME: Busy Light
        PRODUCT_MODULE_NAME: BusyLight
        INFOPLIST_FILE: BusyLight/Info.plist
        CODE_SIGN_ENTITLEMENTS: BusyLight/BusyLight.entitlements
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        SWIFT_STRICT_CONCURRENCY: complete
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_STYLE: Manual
    entitlements:
      path: BusyLight/BusyLight.entitlements
      properties: {}

  BusyLightTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BusyLightTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: BusyLight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mboszko.BusyLightTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Busy Light.app/Contents/MacOS/Busy Light"

schemes:
  BusyLight:
    build:
      targets:
        BusyLight: all
        BusyLightTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BusyLightTests
